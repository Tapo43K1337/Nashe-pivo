<style>
  :root {
    /* Amber Night — default */
    --bg: #0E0E0C;
    --bg-2: #15140F;
    --surface: #1A1814;
    --ink: #F2EBDC;
    --ink-2: #C8BFAE;
    --ink-3: #7A7365;
    --line: #2A2721;
    --accent: #D89B3C;
    --accent-2: #E8B766;
    --danger: #B8553C;
  }
  [data-theme="forest"] {
    --bg: #0C1410;
    --bg-2: #101914;
    --surface: #162019;
    --ink: #EDE6D2;
    --ink-2: #B7B29B;
    --ink-3: #6E7567;
    --line: #223028;
    --accent: #C89B4A;
    --accent-2: #DDB877;
    --danger: #B8553C;
  }
  [data-theme="cream"] {
    --bg: #F2EBDC;
    --bg-2: #EADFCB;
    --surface: #FFFFFF;
    --ink: #14140F;
    --ink-2: #3F3A30;
    --ink-3: #807766;
    --line: #D6CBB5;
    --accent: #A15C1C;
    --accent-2: #C27527;
    --danger: #8E3A24;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  #boot-hint {
    padding: 28px 24px;
    max-width: 420px;
    margin: 0 auto;
    color: var(--ink-2);
    font-size: 14px;
    line-height: 1.55;
    text-align: center;
  }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
    transition: background .4s ease, color .4s ease;
  }
  h1, h2, h3, h4 { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 400; letter-spacing: -0.02em; margin: 0; }
  .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.02em; text-transform: uppercase; font-size: 11px; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  .hide-scrollbar::-webkit-scrollbar { display: none; }
  .hide-scrollbar { scrollbar-width: none; }

  /* Placeholder SVG banner */
  .ph-stripe {
    background-image: repeating-linear-gradient(
      45deg,
      color-mix(in srgb, var(--ink) 6%, transparent) 0 8px,
      transparent 8px 16px
    );
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
  .fadeUp { animation: fadeUp .7s ease both; }

  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .catalog-sort-list button {
    transition: background 0.15s ease, color 0.15s ease;
  }
  .catalog-sort-list button:hover {
    background: color-mix(in srgb, var(--accent) 12%, var(--surface)) !important;
    color: var(--ink) !important;
  }

  @media (max-width: 899px) {
    nav.site-nav { padding-left: 16px !important; padding-right: 16px !important; }
    .nav-brand-text { letter-spacing: 0.12em !important; font-size: 11px !important; }
  }

  @media (max-width: 768px) {
    .hero-section {
      grid-template-columns: 1fr !important;
      padding: 96px 20px 56px !important;
      min-height: auto !important;
    }
    .hero-photos { display: none !important; }
    .hero-stats { gap: 24px 32px !important; margin-top: 48px !important; }
    .hero-stats > div > div:first-child { font-size: 34px !important; }
    .hero-cta { width: 100%; }
    .hero-cta button { flex: 1; min-width: 0; justify-content: center; }
    section,
    .about-section,
    .catalog-section,
    .contacts-section { padding-left: 20px !important; padding-right: 20px !important; }
    .about-section { padding-top: 96px !important; padding-bottom: 72px !important; }
    .catalog-section { padding-top: 96px !important; padding-bottom: 72px !important; }
    .contacts-section { padding-top: 96px !important; padding-bottom: 56px !important; }

    .pillars-grid { grid-template-columns: 1fr !important; }
    .pillars-grid > div { border-left: none !important; border-top: 1px solid var(--line) !important; }
    .pillars-grid > div:first-child { border-top: none !important; }
    .catalog-header { align-items: flex-start !important; flex-direction: column !important; margin-bottom: 28px !important; }
    .catalog-tabs-row {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap;
      margin-bottom: 18px !important;

    }
    .catalog-tabs-row::-webkit-scrollbar { display: none; }
    .catalog-tabs-row button { flex: 0 0 auto; white-space: nowrap; }
    .prod-card--mob .flip-inner > div:first-of-type {

    .prod-card--mob-solo .flip-inner > div:first-of-type {

    .prod-modal-overlay {

    .prod-modal-visual {

    }
    .prod-modal-body {
      flex: 1 1 auto !important;

      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch !important;
      padding: 14px 16px calc(18px + env(safe-area-inset-bottom, 0px)) !important;
    }
    .prod-modal-close {
      top: calc(10px + env(safe-area-inset-top, 0px)) !important;
      right: 12px !important;
      background: color-mix(in srgb, var(--bg) 92%, transparent) !important;
      backdrop-filter: blur(8px) !important;
    }
    .prod-modal-title {
      font-size: clamp(22px, 6.2vw, 32px) !important;
      margin: 8px 0 10px !important;
    }
    .prod-modal-kicker { font-size: 10px !important; letter-spacing: 0.14em !important; }
    .prod-modal-tagline { font-size: 14px !important; line-height: 1.45 !important; }
    .prod-modal-dl { gap: 10px !important; }
    .prod-modal-divider {
      margin: 12px 0 !important;
      background: color-mix(in srgb, var(--line) 65%, transparent) !important;
    }
    .prod-modal-price { font-size: 28px !important; }
    .prod-modal-footer-row { margin-bottom: 12px !important; }
    .prod-modal-add { padding: 14px 16px !important; font-size: 11px !important; }
    .def-row { grid-template-columns: 1fr !important; gap: 2px !important; }
    .def-row dd { font-size: 13px !important; line-height: 1.45 !important; }
    .cart-drawer { max-width: 100% !important; border-left: none !important; }
    .checkout-modal-overlay {
      padding: 0 !important;
      align-items: stretch !important;
      padding-top: env(safe-area-inset-top, 0) !important;
    }
    .checkout-modal {
      max-width: 100% !important;
      max-height: 100dvh !important;
      height: 100dvh !important;
      border-radius: 0 !important;
      border-left: none !important;
      border-right: none !important;
      box-shadow: none !important;
    }
  }

  @media (min-width: 769px) and (max-width: 1100px) {
    .catalog-filters { grid-template-columns: 1fr 1fr !important; }
  }

  .admin-root { min-height: 100vh; }
  .admin-table th, .admin-table td { vertical-align: middle; }
  @media (max-width: 900px) {
    .admin-root { flex-direction: column !important; }
    .admin-sidebar { width: 100% !important; min-height: 0 !important; border-right: none !important; border-bottom: 1px solid var(--line); }
    .admin-main { padding: 20px 16px !important; }
    .admin-content-grid { grid-template-columns: 1fr !important; }
  }
</style>

<script>
(function () {
  try {
    var parts = location.pathname.split('/').filter(Boolean);
    for (var j = 0; j < parts.length; j++) {
      var dec = decodeURIComponent(parts[j]).replace(/\+/g, ' ');
      if (/^nashe\s+pivo\.html$/i.test(dec)) {
        var repo = j > 0 ? parts[j - 1] : 'Nashe-pivo';
        var tail = parts.slice(j + 1).join('/');
        location.replace(location.origin + '/' + repo + '/' + (tail || '') + location.search + location.hash);
        return;
      }
    }
  } catch (e) {}
  var m = document.querySelector('meta[name="np-github-repo"]');
  var repo = m && m.getAttribute('content');
  repo = repo && String(repo).replace(/^\/+|\/+$/g, '');
  if (repo && /\.github\.io$/i.test(location.hostname))
    window.__NP_BASENAME__ = '/' + repo;
})();
</script>
<div id="root">

  </p>
</div>
